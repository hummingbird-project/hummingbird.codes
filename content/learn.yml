title: Learn - Hummingbird
description: Tutorials, articles, and talks about Hummingbird from the Swift community.

hero:
  title: Learn Hummingbird
  description: |
    Tutorials, articles, and talks from the Swift community. Whether you prefer reading or watching, there's something here to get you started or go deeper.

swiftonserver:
  title: Swift on Server
  description: In-depth articles covering Hummingbird features and integrations.
  items:
    - title: What's new in Hummingbird 2?
      description: An overview of the major changes and new features in Hummingbird 2.
