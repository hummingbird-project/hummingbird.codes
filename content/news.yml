title: Hummingbird - News
description: Hummingbird 2 is a cross-platform web server framework for Swift.
hero:
  title: News
  description: Latest news and developments from Hummingbird.
  headline:
    label: Hummingbird 2 is out!
    to: /news/hummingbird-2
    icon: i-heroicons-arrow-top-right-on-square-20-solid
posts:
  - title: Swift Jobs v1.0
    description: Last year we released v1.0 of swift-jobs, the durable job execution queue. This week we released v1.0 of swift-jobs-valkey, the Valkey driver for swift-jobs. This is the final piece of the durable jobs puzzle.
    to: /news/swift-jobs-1-0
    date: 4 May 2026
    authors:
      - Adam
  - title: Our AI Policy
    description: As AI assisted coding becomes more prevalent in open source, we have established a policy for AI usage in contributions to Hummingbird.
    to: /news/ai-policy
    date: 14 Apr 2026
    authors:
      - Joannis
  - title: We're now on GitHub Sponsors
    description: Hummingbird is on GitHub Sponsors. Help us to continue maintaining and improving the framework by sponsoring development.
    to: /news/github-sponsors
    date: 6 Apr 2026
    authors:
      - Adam
  - title: Hummingbird 2 is out!
    description: Hummingbird 2 has been released. The framework has been completely rebuilt from scratch with Swift concurrency taking a central role.
    to: /news/hummingbird-2
    date: 11 Sep 2024
    authors:
      - Adam
  - title: Hummingbird 2 Release Candidate
    description: The Hummingbird 2 Release Candidate is now available, marking the final stages before the official release.
    to: /news/hummingbird-2-release-candidate
    date: 1 July 2024
    authors:
      - Adam
